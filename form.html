<!DOCTYPE html>
<html>
<head>
  <title>Lost and Found - Report Item</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="navbar">
    <a href="form.html">Report Item</a>
    <a href="items.html">View Items</a>
  </div>

  <div class="header">
    <h1>Light Academy Secondary School</h1>
    <p>Lost and Found System</p>
  </div>

  <div class="box">
    <h2>Report a Lost or Found Item</h2>
    <p>Fill in the form below and hand it to the ICT office.</p>

    <label>Item Name</label>
    <input type="text" placeholder="e.g. Mathematics textbook">

    <label>Description</label>
    <textarea placeholder="Colour, size, any names or marks on it"></textarea>

    <label>Status</label>
    <select>
      <option>-- Select --</option>
      <option>Lost</option>
      <option>Found</option>
    </select>

    <label>Location</label>
    <input type="text" placeholder="e.g. Library, S.3 classroom">

    <label>Date</label>
    <input type="date">

    <label>Your Name</label>
    <input type="text" placeholder="Your full name">

    <label>Your Class</label>
    <input type="text" placeholder="e.g. S.3A">

    <button>Submit Report</button>
  </div>

  <div class="footer">
    <p>Light Academy Secondary School &copy; 2026</p>
  </div>

</body>
</html>
